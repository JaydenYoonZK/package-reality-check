name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [18, 20, 22, 24, 26]
        include:
          # One representative Node on the other platforms: path handling,
          # CRLF, and the bin shim are the cross-platform risks.
          - os: windows-latest
            node: 24
          - os: macos-15
            node: 24
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      # Zero dependencies: nothing to install. The test suite is fully
      # mocked and needs no network.
      - run: npm test
      # Smoke-test the CLI entry point itself.
      - run: node bin/cli.mjs --help
      - run: node bin/cli.mjs --version

  action-smoke:
    name: GitHub Action smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./
        with:
          path: .
          fail_on: danger
